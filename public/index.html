<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="Consultorio" content="width=device-width, initial-scale=1.0">
    <title>Consultório Fik tissio</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Gestão da Clínica</h1>

    <main class="container">
        
        <!-- SEÇÃO DE PACIENTES -->
        <section class="card">
            <h2>Cadastro de Pacientes</h2>
            <form id="formPaciente">
                <input type="text" id="nome" placeholder="Nome Completo" required> <br>
                <input type="text" id="cpf" placeholder="CPF (apenas números)" required> <br>
                <input type="text" id="telefone" placeholder="Telefone"> <br>
                <input type="number" id="idade" placeholder="Idade" required> <br>
                <button type="submit" class="btn-save">Cadastrar Paciente</button>
            </form>
            
            <section class="card" id="lista">
                <h3>Lista de Pacientes</h3>
                <ul id="listaPacientes" class="listagem"></ul>
            </section>
        </section>

        <!-- SEÇÃO DE CONSULTAS -->
        <section class="card">
            <h2>Agendamento de Consultas</h2>
            <form id="formConsulta">
                <!-- Este select será preenchido pelo JS com os pacientes cadastrados -->
                <select id="id_paciente" required>
                    <option value="">Selecione o Paciente</option>
                </select>

                <br>
                
                <input type="text" id="tipo" placeholder="Tipo de Consulta (Ex: Geral)" required> <br>
                <input type="text" id="nome_medico" placeholder="Nome do Médico" required> <br>
                <button type="submit" class="btn-save">Agendar Consulta</button>
            </form>

            <section class="card" id="lista">
                <h3>Consultas Marcadas</h3>
                <ul id="listaConsultas" class="listagem"></ul>
            </section>
        </section>

    </main>

    <!-- Importando o JavaScript -->
    <script src="app.js"></script>
</body>
</html>
